tags:
  - name: User
    description: User management

components:
  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
          example: '6620f1a2b3c4d5e6f7a8b9c0'
        name:
          type: string
          example: 'Nguyen Van A'
        email:
          type: string
          format: email
          example: 'nguyenvana@example.com'
        avatar:
          type: string
          format: uri
          example: 'https://example.com/avatar.jpg'
        role:
          type: string
          enum: [user, admin]
          example: 'user'
        status:
          type: string
          enum: [active, inactive, banned]
          example: 'active'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RegisterUserBody:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 50
          example: 'Nguyen Van A'
        email:
          type: string
          format: email
          example: 'nguyenvana@example.com'
        password:
          type: string
          minLength: 6
          maxLength: 100
          format: password
          example: 'password123'

    UpdateUserBody:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 50
          example: 'Nguyen Van B'
        avatar:
          type: string
          format: uri
          example: 'https://example.com/new-avatar.jpg'

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          example: 50
        totalPages:
          type: integer
          example: 5
        hasNextPage:
          type: boolean
          example: true
        hasPreviousPage:
          type: boolean
          example: false

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
        status:
          type: integer
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
            status:
              type: integer
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

    ValidationError:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
              example: 'Validation failed'
            status:
              type: integer
              example: 422
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                    example: 'email'
                  message:
                    type: string
                    example: 'Invalid email format'

paths:
  /user:
    get:
      summary: Get all users
      description: Retrieve a paginated list of users
      tags: [User]
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Number of items per page
        - in: query
          name: search
          schema:
            type: string
          description: Search by name or email
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [name, email, createdAt]
          description: Field to sort by
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [ASC, DESC]
            default: DESC
          description: Sort direction
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'OK'
                  status:
                    type: integer
                    example: 200
                  data:
                    type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'

    post:
      summary: Register a new user
      description: Create a new user account
      tags: [User]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserBody'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'New user created'
                  status:
                    type: integer
                    example: 201
                  data:
                    $ref: '#/components/schemas/User'
        '409':
          description: Conflict — Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /user/{id}:
    get:
      summary: Get user profile
      description: Get user information by ID
      tags: [User]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: User ID (MongoDB ObjectId)
          example: '6620f1a2b3c4d5e6f7a8b9c0'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'OK'
                  status:
                    type: integer
                    example: 200
                  data:
                    $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update user profile
      description: Update user information by ID
      tags: [User]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: User ID (MongoDB ObjectId)
          example: '6620f1a2b3c4d5e6f7a8b9c0'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserBody'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'User updated Successfully!'
                  status:
                    type: integer
                    example: 200
                  data:
                    $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

    delete:
      summary: Delete user
      description: Delete a user by ID
      tags: [User]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: User ID (MongoDB ObjectId)
          example: '6620f1a2b3c4d5e6f7a8b9c0'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'User deleted successfully!'
                  status:
                    type: integer
                    example: 200
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: '6620f1a2b3c4d5e6f7a8b9c0'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
