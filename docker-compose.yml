version: '3.8'
services:
  api:
    build: ./packages/api
    ports:
      - '${PORT:-4000}:${PORT:-4000}'
    env_file:
      - ./.env.development
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: